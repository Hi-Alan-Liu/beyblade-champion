<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陀螺配置卡片產生器</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>陀螺配置卡片產生器</h1>
    <span class="topbar-sub">Beyblade Ranking Card Generator</span>
  </header>

  <main class="layout">
    <!-- 左：控制面板 -->
    <section class="controls" id="controls">
      <button class="btn-download" id="btnDownload">⬇ 下載目前卡片 PNG</button>
      <button class="btn-download-all" id="btnDownloadAll">⬇⬇ 匯出全部卡片</button>

      <details class="group" open>
        <summary>名次與文字</summary>
        <label>匯出尺寸
          <select id="sizeSelect">
            <option value="square">方形 1:1（1080×1080）</option>
          </select>
        </label>
        <label>名次
          <select id="rankSelect">
            <option value="1">1ST PLACE</option>
            <option value="2">2ND PLACE</option>
            <option value="3">3RD PLACE</option>
            <option value="4">4TH PLACE</option>
          </select>
        </label>
        <label>比賽名稱
          <input type="text" id="logoInput" value="經典賽" />
        </label>
        <label>得獎人名稱
          <input type="text" id="nickInput" placeholder="例：陀螺毀滅者C" />
        </label>
      </details>

      <details class="group" open>
        <summary>圖片</summary>
        <label>人物照片
          <input type="file" id="personFile" accept="image/*" />
        </label>
        <label>右側面板背景（選填）
          <input type="file" id="bgFile" accept="image/*" />
        </label>
      </details>

      <!-- 3 顆陀螺的控制項由 app.js 動態產生（每個部件＝圖庫選取格） -->
      <div id="beyControls"></div>

      <div class="row-2">
        <button class="btn-dup" id="btnDuplicate">⧉ 複製目前卡片</button>
        <button class="btn-reset" id="btnReset">清空重設</button>
      </div>
    </section>

    <!-- 右：卡片預覽 -->
    <section class="preview" id="previewArea">
      <div class="card-tabs" id="cardTabs"></div>
      <div class="stage" id="stage">
        <div class="card" id="card">
          <div class="title">
            <div class="title-text" id="logoText">經典賽</div>
            <div class="title-divider" aria-hidden="true">
              <span class="td-line"></span>
              <span class="td-gem">◈</span>
              <span class="td-line"></span>
            </div>
          </div>

          <div class="person" id="personWrap">
            <img id="personImg" alt="" />
          </div>

          <div class="rank-scrim"></div>
          <div class="rank">
            <div class="rank-place" id="rankPlace">1st Place</div>
            <div class="rank-name" id="rankNick"></div>
          </div>

          <div class="panel">
            <div class="panel-bg" id="panelBg"></div>
            <div class="rows" id="rows"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 離線優先：先載本機版，失敗才退回 CDN -->
  <script src="vendor/html-to-image.js"></script>
  <script>
    if (!window.htmlToImage) {
      document.write('<script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"><\/script>');
    }
  </script>
  <!-- 圖庫資料：bundle 為 JSON 打包成 JS（file:// 與 http 皆可用），db.js 為查詢層 -->
  <script src="assets/db.bundle.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
